<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Custom Title Bar -->
    <title>Ishan Shrestha</title>

    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/4dfd1d7bab.js"></script>

    <!-- Google fonts - Poppins -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
            colors: {
              dark: {
                DEFAULT: "#0d1117", // Darker blue-black
                secondary: "#161b22", // Dark blue
                accent: "#1f2937", // Blue-gray
              },
              accent: {
                DEFAULT: "#1E40AF", // Strong blue
                light: "#3B82F6", // Lighter blue
                dark: "#1E3A8A", // Darker blue
              },
            },
          },
        },
      };
    </script>

    <!-- Page styles (extracted from inline CSS) -->
    <link rel="stylesheet" href="../css/homepage.css" />

    <!-- Custom favicon -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />

    <!-- GSAP Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

    <!-- Google Analytics Tracking Tag -->
    <script>
      (function (i, s, o, g, r, a, m) {
        i["GoogleAnalyticsObject"] = r;
        (i[r] =
          i[r] ||
          function () {
            (i[r].q = i[r].q || []).push(arguments);
          }),
          (i[r].l = 1 * new Date());
        (a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]);
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m);
      })(
        window,
        document,
        "script",
        "//www.google-analytics.com/analytics.js",
        "ga"
      );
      ga("create", "UA-68657454-1", "auto");
      ga("send", "pageview");
    </script>

    <!-- Open Graph Metadata tags -->
    <meta property="og:url" content="https://ishans.com.np/" />
    <meta
      property="og:image:alt"
      content="A Deep Dreamed view of the Middlesex Fells Reservoir in Medford, MA"
    />
    <meta property="g:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:author" content="Ishan Shrestha" />
    <meta property="og:title" content="Ishan's Personal Website" />
    <meta
      property="og:description"
      content="This is Ishan Shrestha's Personal Website, where he includes college projects, personal side projects and any professional or open source stuff"
    />
    <meta
      name="description"
      content="This is Ishan Shrestha's Personal Website, where he includes college projects, personal side projects and any professional or open source stuff"
    />
  </head>

  <body class="bg-[#121212]">
    <noscript>
      <div
        class="fixed inset-0 z-[100] flex items-center justify-center bg-[#121212] text-gray-300 p-6 text-center"
      >
        <p>This portfolio needs JavaScript to load section content.</p>
      </div>
    </noscript>

    <!-- Injected from pages/partials/nav.html -->
    <div id="site-nav" aria-busy="true"></div>

    <!-- Injected from pages/partials/section-*.html (Home, Services, Experience, Fun, GitHub, Projects, Contact) -->
    <div id="site-sections" aria-busy="true">
      <p
        class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-gray-500 text-sm z-20 pointer-events-none md:left-[calc(50%+var(--nav-rail-width)/2)]"
        id="homepage-loading-hint"
      >
        Loading&hellip;
      </p>
    </div>

    <!-- Copyright Text -->
    <div
      class="copyright-footer fixed bottom-4 left-0 w-full text-center text-gray-500 text-xs z-30 md:bottom-4 pb-[env(safe-area-inset-bottom,0)] max-md:bottom-[calc(var(--nav-mobile-bar-height)+0.25rem)] pointer-events-none"
    >
      Ishan Shrestha &copy; 2021 - <span id="copyright-year"></span>
    </div>

    <script src="../js/homepage.js" defer></script>
  </body>
</html>
